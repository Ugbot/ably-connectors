name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ninja-build cmake

      - name: Configure
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DABLY_BUILD_TESTS=ON \
            -DABLY_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build -L unit --output-on-failure

  macos:
    name: macOS (Apple Clang)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DABLY_BUILD_TESTS=ON \
            -DABLY_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build -L unit --output-on-failure

  windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DABLY_BUILD_TESTS=ON `
            -DABLY_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Test
        run: ctest --test-dir build -C RelWithDebInfo -L unit --output-on-failure
